name: CI
on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:
concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions: # needed to allow julia-actions/cache to proactively delete old caches that it has created
      actions: write
      contents: read
    env:
      TERRA_BINARY_VERSION: v0.4.0
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: '1.12'
            os: macos-latest
            arch: aarch64
    steps:
      - uses: actions/checkout@v5
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - name: Download private dylib (macOS arm64)
        if: matrix.os == 'macos-latest' && matrix.arch == 'aarch64'
        env:
          GH_TOKEN: ${{ secrets.BINARIES_PAT }}
          VER: ${{ env.TERRA_BINARY_VERSION }}
        run: |
          set -euo pipefail
          mkdir -p test/lib
          gh release download "$VER" \
            --repo amta3208/terra-binaries \
            --pattern "terra-${VER}-macos-arm64.dylib" \
            --dir test/lib
          xattr -dr com.apple.quarantine test/lib/ 2>/dev/null || true
          echo "TERRA_LIB_PATH=$(pwd)/test/lib/terra-${VER}-macos-arm64.dylib" >> "$GITHUB_ENV"
      - name: Install Open MPI runtime
        if: matrix.os == 'macos-latest'
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
        run: |
          brew install open-mpi
      - name: Diagnose dylib
        if: matrix.os == 'macos-latest' && matrix.arch == 'aarch64'
        run: |
          ls -la "$TERRA_LIB_PATH"
          otool -L "$TERRA_LIB_PATH"
          xattr "$TERRA_LIB_PATH"
          julia -e 'using Libdl; println(dlopen(ENV["TERRA_LIB_PATH"]))'
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - name: Diagnose native initialization
        if: matrix.os == 'macos-latest' && matrix.arch == 'aarch64'
        env:
          TERRA_REFERENCE_CASE_PATH: ${{ github.workspace }}/test/cases/terra_fortran/reference_case
          TERRA_NATIVE_DIAG_LOG: ${{ runner.temp }}/terra-native-init.log
        run: |
          export DIAG_CASE_PATH="$RUNNER_TEMP/terra-ci-reference-case"
          rm -rf "$DIAG_CASE_PATH"
          cp -R "$TERRA_REFERENCE_CASE_PATH" "$DIAG_CASE_PATH"
          rm -f "$TERRA_NATIVE_DIAG_LOG"
          set +e
          julia --project=. -e '
            using TERRA: TERRA as terra

            case_path = ENV["DIAG_CASE_PATH"]
            log_path = ENV["TERRA_NATIVE_DIAG_LOG"]

            try
                terra.close_terra_library()
            catch
            end

            terra.load_terra_library!()

            try
                terra.set_api_finalize_mpi_wrapper(false)
            catch
            end

            println("diag-case-path=" * case_path)
            println("diag-native-log=" * log_path)
            flush(stdout)

            result = terra.initialize_api_wrapper(
                case_path = case_path,
                native_console_level = terra.API_NATIVE_LOG_VERBOSE,
                native_file_level = terra.API_NATIVE_LOG_VERBOSE,
                native_log_path = log_path,
            )

            println("diag-init-result=" * repr(result))
            flush(stdout)
          '
          status=$?
          set -e

          echo "diagnostic init exit status: $status"
          if [ -f "$TERRA_NATIVE_DIAG_LOG" ]; then
            echo "--- begin native init log ---"
            cat "$TERRA_NATIVE_DIAG_LOG"
            echo "--- end native init log ---"
          else
            echo "native init log file was not created: $TERRA_NATIVE_DIAG_LOG"
          fi
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    permissions:
      actions: write # needed to allow julia-actions/cache to proactively delete old caches that it has created
      contents: write
      statuses: write
    steps:
      - uses: actions/checkout@v5
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - name: Configure doc environment
        shell: julia --project=docs --color=yes {0}
        run: |
          using Pkg
          Pkg.develop(PackageSpec(path=pwd()))
          Pkg.instantiate()
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-docdeploy@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
      - name: Run doctests
        shell: julia --project=docs --color=yes {0}
        run: |
          using Documenter: DocMeta, doctest
          using TERRA
          DocMeta.setdocmeta!(TERRA, :DocTestSetup, :(using TERRA); recursive=true)
          doctest(TERRA)
